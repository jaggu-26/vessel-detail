    // ── Map Page ──────────────────────────────────────────────────────────────
    function MapPage({vessel, onAnalytics, onVesselChange}) {
      var [cardPos, setCardPos] = useState(null);
      var [mapVessel, setMapVessel] = useState(vessel);
      var [cardLoading, setCardLoading] = useState(false);
      var [cardVariant, setCardVariant] = useState("v2");
      var [searchOpen, setSearchOpen] = useState(true);
      var [weatherOpen, setWeatherOpen] = useState(false);
      var [weatherLoading, setWeatherLoading] = useState(false);
      var [activeOverlays, setActiveOverlays] = useState({Wind_Speed:false,Wind_Dir:false,Curr_Speed:false,Curr_Dir:false,Wave_Height:false,Wave_Dir:false});
      var dragRef = useRef(null);
      var mapContainerRef = useRef(null);
      var leafletMapRef = useRef(null);
      var markersRef = useRef({});
      var prevVesselRef = useRef(vessel ? vessel.name : null);
      var handleVesselSelectRef = useRef(null);
      var speedOverlayRef = useRef(null);

      function placeCardNearVessel(pos) {
        var map = leafletMapRef.current;
        if(!map || !mapContainerRef.current || !pos) return;
        var pt = map.latLngToContainerPoint([pos.lat, pos.lng]);
        var mapW = mapContainerRef.current.offsetWidth;
        var mapH = mapContainerRef.current.offsetHeight;
        var circleHalf = 25, cardW = 510, cardH = 310, gap = 16;
        var cardLeft = pt.x - circleHalf - gap - cardW;
        var cardTop  = pt.y - cardH / 2;
        if(cardLeft < 16) cardLeft = pt.x + circleHalf + gap;
        cardTop = Math.max(16, Math.min(cardTop, mapH - cardH - 16));
        setCardPos({x: cardLeft, y: cardTop});
      }

      function handleVesselSelect(v) {
        setMapVessel(v);
        if(onVesselChange) onVesselChange(v);
        setSearchOpen(false);
        setCardLoading(true);
        setTimeout(function(){ setCardLoading(false); }, 900);
      }
      handleVesselSelectRef.current = handleVesselSelect;

      function handleClearVessel() {
        // Reset previously selected marker icon
        var L = window.L;
        if(L && leafletMapRef.current && prevVesselRef.current && markersRef.current[prevVesselRef.current]) {
          var prev = VESSEL_LIST.find(function(v){ return v.name === prevVesselRef.current; });
          if(prev) {
            var prevPos = VESSEL_MAP_POSITIONS[prev.name];
            markersRef.current[prevVesselRef.current].setIcon(makeVesselIcon(L, getVesselColor(prev.type), false, prevPos && prevPos.heading));
          }
        }
        prevVesselRef.current = null;
        setMapVessel(null);
        setCardPos(null);
        if(leafletMapRef.current) {
          var w = leafletMapRef.current.getSize().x;
          var zoom = Math.log2(w / 256);
          leafletMapRef.current.setView([20, 10], zoom, {animate:true});
        }
      }

      // Init Leaflet map once on mount
      useEffect(function() {
        if(!mapContainerRef.current || leafletMapRef.current) return;
        var L = window.L;
        if(!L) return;
        var initVessel = vessel;
        var startPos = initVessel && VESSEL_MAP_POSITIONS[initVessel.name];
        var map = L.map(mapContainerRef.current, {
          center: startPos ? [startPos.lat, startPos.lng] : [20, 10],
          zoom: startPos ? 4 : 2,
          minZoom: 1,
          zoomControl: false,
          attributionControl: true,
        });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 19,
          noWrap: true,
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
        }).addTo(map);
        if (!startPos) {
          setTimeout(function() {
            var w = map.getSize().x;
            var zoom = Math.log2(w / 256);
            map.setView([20, 10], zoom, {animate: false});
          }, 50);
        }
        VESSEL_LIST.forEach(function(v) {
          var pos = VESSEL_MAP_POSITIONS[v.name];
          if(!pos) return;
          var isSel = initVessel && initVessel.name === v.name;
          var marker = L.marker([pos.lat, pos.lng], {icon: makeVesselIcon(L, getVesselColor(v.type), isSel, pos.heading)}).addTo(map);
          marker.bindTooltip(v.name, {direction:'top', offset:[0,-14], className:'vessel-tip'});
          marker.on('click', (function(vv){ return function(){ handleVesselSelectRef.current(vv); }; })(v));
          markersRef.current[v.name] = marker;
        });
        leafletMapRef.current = map;
        // No isolation on map pane — lets container background act as backdrop in no-tile areas
        // Pane z-250: color blend → ocean becomes #A5C8EA, land (white/near-white) stays near-white
        var seaPane = map.createPane('seaColorPane');
        seaPane.style.zIndex = 250;
        seaPane.style.mixBlendMode = 'color';
        var seaDiv = document.createElement('div');
        seaDiv.style.cssText = 'position:absolute;width:8000px;height:8000px;top:-4000px;left:-4000px;background:#A5C8EA;pointer-events:none;';
        seaPane.appendChild(seaDiv);
        // Position card immediately once map tiles render
        if(startPos) {
          map.whenReady(function() {
            placeCardNearVessel(startPos);
          });
        }
        return function() { map.remove(); leafletMapRef.current = null; markersRef.current = {}; };
      }, []);

      // Update marker styles + pan when selected vessel changes
      useEffect(function() {
        var L = window.L;
        if(!L || !leafletMapRef.current || !mapVessel) return;
        if(prevVesselRef.current && markersRef.current[prevVesselRef.current]) {
          var prev = VESSEL_LIST.find(function(v){ return v.name === prevVesselRef.current; });
          if(prev) {
            var prevPos = VESSEL_MAP_POSITIONS[prev.name];
            markersRef.current[prevVesselRef.current].setIcon(makeVesselIcon(L, getVesselColor(prev.type), false, prevPos && prevPos.heading));
          }
        }
        if(markersRef.current[mapVessel.name]) {
          var selPos = VESSEL_MAP_POSITIONS[mapVessel.name];
          markersRef.current[mapVessel.name].setIcon(makeVesselIcon(L, getVesselColor(mapVessel.type), true, selPos && selPos.heading));
        }
        var pos = VESSEL_MAP_POSITIONS[mapVessel.name];
        if(pos) {
          leafletMapRef.current.flyTo([pos.lat, pos.lng], 4, {animate:true, duration:1});
          leafletMapRef.current.once('moveend', function() { placeCardNearVessel(pos); });
          setTimeout(function() { placeCardNearVessel(pos); }, 1100);
        }
        prevVesselRef.current = mapVessel.name;
      }, [mapVessel && mapVessel.name]);

      // Wind Speed overlay — ocean-only canvas heatmap via Leaflet imageOverlay
      useEffect(function(){
        var L = window.L;
        if(!L || !leafletMapRef.current) return;
        var map = leafletMapRef.current;
        if(speedOverlayRef.current){ map.removeLayer(speedOverlayRef.current); speedOverlayRef.current=null; }
        if(!activeOverlays.Wind_Speed){ setWeatherLoading(false); return; }

        var cancelled=false;
        setWeatherLoading(true);
        // Minimum 5-second loading time runs in parallel with fetch/render
        var minWait=new Promise(function(res){ setTimeout(res,5000); });

        // ── 1. Mercator projection helpers ────────────────────────────────────
        // Leaflet uses Web Mercator. Both speed pixels and land polygon coords
        // must be in the same Mercator space so the mask aligns with the basemap.
        var W=720, H=360;
        var LAT_MAX=78, LAT_MIN=-78;  // stay within clean Mercator range; avoids polar patch
        function mercY(latDeg){ return Math.log(Math.tan(Math.PI/4+latDeg*Math.PI/360)); }
        var yMercTop=mercY(LAT_MAX), yMercBot=mercY(LAT_MIN);
        // canvas-pixel y → geographic latitude (Mercator inverse)
        function pixToLat(py){ var ym=yMercTop-(py/H)*(yMercTop-yMercBot); return (2*Math.atan(Math.exp(ym))-Math.PI/2)*180/Math.PI; }
        // geographic latitude → canvas-pixel y (Mercator forward)
        function latToPix(latDeg){ var ym=mercY(Math.max(LAT_MIN,Math.min(LAT_MAX,latDeg))); return (1-(ym-yMercBot)/(yMercTop-yMercBot))*H; }

        // ── 2. Generate speed field in Mercator space ─────────────────────────
        var cnv=document.createElement('canvas'); cnv.width=W; cnv.height=H;
        var ctx2d=cnv.getContext('2d');
        var img=ctx2d.createImageData(W,H); var d=img.data;

        function computeSpd(lat,lon){
          var la=Math.abs(lat), base;
          if(la<5)       base=3;
          else if(la<25) base=8 +4 *Math.sin((la-5 )/20*Math.PI);
          else if(la<35) base=5 +3 *Math.cos((la-25)/10*Math.PI);
          else if(la<65) base=12+(lat<0?1.65:1.0)*13*Math.sin((la-35)/30*Math.PI);
          else           base=9;
          var lr=lon*Math.PI/180, ar=lat*Math.PI/180;
          var v=5.5*Math.sin(lr*3+ar*2+1.5)+3*Math.cos(lr*5-ar*4+0.7)
               +2  *Math.sin(lr*8+ar*7+2.3)+1.5*Math.cos(lr*12+ar*3+0.4);
          function g(cx,cy,sx,sy){var dx=(lon-cx)/sx,dy=(lat-cy)/sy;return Math.exp(-(dx*dx+dy*dy));}
          var s=14*g(-28,55,26,14)+12*g(-168,50,30,14)+20*g(5,-56,36,12)+17*g(120,-50,30,12)
               +17*g(135,20,9,9)+16*g(-75,18,8,8)+14*g(88,15,7,7)+11*g(-120,35,11,10)
               +13*g(55,12,8,8)+10*g(-155,60,14,10);
          var c=-9*g(-138,30,20,10)-8*g(-38,30,20,10)-6*g(100,28,15,10)-5*g(-5,25,14,10)-7*g(30,-32,16,10);
          return Math.max(0,Math.min(40,base+v+s+c));
        }
        var stops=[
          [0,   [ 2, 62,138,195]],[0.14,[ 0,119,182,205]],[0.29,[ 0,180,216,210]],
          [0.43,[72,202,228,210]],[0.57,[144,224,140,210]],[0.71,[247,183, 49,210]],
          [0.86,[247,100, 20,215]],[1.0, [220, 28, 28,215]],
        ];
        function colorOf(spd){
          var t=Math.min(spd/35,1);
          for(var i=1;i<stops.length;i++){
            if(t<=stops[i][0]){
              var f=(t-stops[i-1][0])/(stops[i][0]-stops[i-1][0]);
              var a=stops[i-1][1],b=stops[i][1];
              return [a[0]+f*(b[0]-a[0]),a[1]+f*(b[1]-a[1]),a[2]+f*(b[2]-a[2]),a[3]+f*(b[3]-a[3])];
            }
          }
          return stops[stops.length-1][1];
        }
        for(var py=0;py<H;py++){
          var lat2=pixToLat(py);       // ← Mercator inverse (not linear)
          for(var px2=0;px2<W;px2++){
            var lon2=(px2/W)*360-180;
            var col=colorOf(computeSpd(lat2,lon2)); var ii=(py*W+px2)*4;
            d[ii]=Math.round(col[0]); d[ii+1]=Math.round(col[1]);
            d[ii+2]=Math.round(col[2]); d[ii+3]=Math.round(col[3]);
          }
        }
        ctx2d.putImageData(img,0,0);

        var bnds=L.latLngBounds([[LAT_MIN,-180],[LAT_MAX,180]]);

        function buildAndAddLayer(landFeatures){
          // Step A — blur speed field BEFORE masking
          var bCnv=document.createElement('canvas'); bCnv.width=W; bCnv.height=H;
          var bCtx=bCnv.getContext('2d');
          bCtx.filter='blur(4px)';
          bCtx.drawImage(cnv,0,0);
          bCtx.filter='none';

          // Step B — land mask in Mercator coordinates (same projection as speed field)
          var mCnv=document.createElement('canvas'); mCnv.width=W; mCnv.height=H;
          var mCtx=mCnv.getContext('2d');
          mCtx.fillStyle='white';
          mCtx.fillRect(0,0,W,H);
          mCtx.globalCompositeOperation='destination-out';
          mCtx.fillStyle='rgba(0,0,0,1)';
          function drawRing(ring){
            if(!ring||!ring.length) return;
            mCtx.beginPath();
            ring.forEach(function(pt,i){
              var mx=(pt[0]+180)/360*W;
              var my=latToPix(pt[1]);  // ← Mercator forward (not linear)
              if(i===0) mCtx.moveTo(mx,my); else mCtx.lineTo(mx,my);
            });
            mCtx.closePath(); mCtx.fill();
          }
          landFeatures.forEach(function(f){
            var g=f.geometry; if(!g) return;
            if(g.type==='Polygon')           drawRing(g.coordinates[0]);
            else if(g.type==='MultiPolygon') g.coordinates.forEach(function(p){ drawRing(p[0]); });
          });
          mCtx.globalCompositeOperation='source-over';

          // Step C — binarise mask to eliminate antialiased edge bleed
          var mData=mCtx.getImageData(0,0,W,H);
          for(var mi=3;mi<mData.data.length;mi+=4){
            mData.data[mi]=mData.data[mi]>128?255:0;
          }
          mCtx.putImageData(mData,0,0);

          // Step D — clip blurred speed to ocean only (mask applied last → sharp edge)
          bCtx.globalCompositeOperation='destination-in';
          bCtx.drawImage(mCnv,0,0);
          bCtx.globalCompositeOperation='source-over';

          // Step D2 — fade out top & bottom edges so overlay boundary is invisible
          var fadeH=Math.round(H*0.06); // 6% of canvas height fades to transparent
          var topGrad=bCtx.createLinearGradient(0,0,0,fadeH);
          topGrad.addColorStop(0,'rgba(0,0,0,1)');
          topGrad.addColorStop(1,'rgba(0,0,0,0)');
          var botGrad=bCtx.createLinearGradient(0,H-fadeH,0,H);
          botGrad.addColorStop(0,'rgba(0,0,0,0)');
          botGrad.addColorStop(1,'rgba(0,0,0,1)');
          bCtx.globalCompositeOperation='destination-out';
          bCtx.fillStyle=topGrad; bCtx.fillRect(0,0,W,fadeH);
          bCtx.fillStyle=botGrad; bCtx.fillRect(0,H-fadeH,W,fadeH);
          bCtx.globalCompositeOperation='source-over';

          // Step E — wait for minimum display time, then add layer and hide loader
          minWait.then(function(){
            if(cancelled) return;
            var layer=L.imageOverlay(bCnv.toDataURL('image/png'),bnds,{opacity:0.80,interactive:false});
            layer.on('add',function(){
              var el=layer.getElement();
              if(el) el.style.pointerEvents='none';
            });
            layer.addTo(map);
            var paneEl=map.getPanes().overlayPane;
            if(paneEl && !paneEl._weatherZSet){ paneEl.style.zIndex=350; paneEl._weatherZSet=true; }
            speedOverlayRef.current=layer;
            setWeatherLoading(false);
          });
        }

        // Use 50m land data for accurate coastlines; cache to avoid re-fetch on toggle
        var LAND_CACHE='__ne50m_land_topo__';
        if(window[LAND_CACHE]){
          buildAndAddLayer(window[LAND_CACHE]);
        } else {
          fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-50m.json')
            .then(function(r){ return r.json(); })
            .then(function(topo){
              if(cancelled) return;
              var geo=window.topojson.feature(topo,topo.objects.land);
              var features=geo.type==='FeatureCollection'?geo.features:[geo];
              window[LAND_CACHE]=features;
              buildAndAddLayer(features);
            })
            .catch(function(err){
              console.warn('Land mask fetch failed — unmasked fallback',err);
              if(cancelled) return;
              minWait.then(function(){
                if(cancelled) return;
                var layer=L.imageOverlay(cnv.toDataURL('image/png'),bnds,{opacity:0.72,interactive:false});
                layer.on('add',function(){ var el=layer.getElement(); if(el) el.style.pointerEvents='none'; });
                layer.addTo(map);
                speedOverlayRef.current=layer;
                setWeatherLoading(false);
              });
            });
        }
        return function(){ cancelled=true; };
      }, [activeOverlays.Wind_Speed]);

      function onCardMouseDown(e) {
        // Don't drag if clicking a button or link inside the card
        if(e.target.closest('button') || e.target.closest('a')) return;
        e.preventDefault();
        var startX = e.clientX - cardPos.x;
        var startY = e.clientY - cardPos.y;
        function onMove(ev) {
          setCardPos({x: ev.clientX - startX, y: ev.clientY - startY});

        function onUp() {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      }

      return (
        <div style={{flex:1,position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {/* Leaflet map */}
          <div ref={mapContainerRef} style={{position:"absolute",inset:0,zIndex:0}}/>

          {/* Weather layer loading indicator */}
          {weatherLoading && (

                alignItems:"center",gap:14,

                      fill="#1852FE" stroke="#1852FE" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </g>

                    <path d="M4.24197 12.4606C4.24197 12.7581 4.39471 13.0567 4.69904 13.2174L11.3899 16.7406C11.7227 16.9162 12.1194 16.9162 12.4522 16.7406L19.143 13.2174C19.4474 13.0567 19.6001 12.7592 19.6001 12.4606"

                <span style={{fontSize:13,fontWeight:600,color:"#334155",
                  letterSpacing:"-0.01em",textAlign:"center"}}>
                  Applying Weather Layers...
                </span>
              </div>
            </div>

          {/* Search bar top */}
          <div style={{position:"absolute",top:16,left:16,zIndex:20,width:280}}>
            <div style={{boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderRadius:4}}>
              <VesselSearch
                selectedVessel={mapVessel}
                onSelectVessel={handleVesselSelect}
                onClear={handleClearVessel}
                open={searchOpen}
                setOpen={setSearchOpen}
                hideEmptyDropdown={true}
                alwaysOpen={true}
              />
            </div>
            {mapVessel && cardPos ? (
              <div style={{marginTop:8,fontSize:13,color:"#475569",fontWeight:500,paddingLeft:2,
                textShadow:"0 1px 3px rgba(255,255,255,0.9)"}}>
                Showing <span style={{fontWeight:700,color:"#0F172A"}}>{mapVessel.name}</span> details
              </div>
            ) : !mapVessel ? (
              <div style={{marginTop:8,fontSize:13,color:"#475569",fontWeight:500,paddingLeft:2,
                textShadow:"0 1px 3px rgba(255,255,255,0.9)"}}>
                Showing <span style={{fontWeight:700,color:"#0F172A"}}>{VESSEL_LIST.length}</span> vessels
              </div>

          </div>

          {/* Passage tabs */}
          <div style={{position:"absolute",top:16,left:308,zIndex:10,
            display:"flex",alignItems:"center",gap:2,
            background:"#fff",borderRadius:4,border:"1px solid #E2E8F0",
            boxShadow:"0 2px 8px rgba(0,0,0,0.08)",padding:"3px",height:42}}>
            {["Current Passage","Past Passages","Misc"].map(function(tab){
              var isActive = tab==="Current Passage";
              return (
                <button key={tab}
                  style={{padding:"0 16px",height:34,border:"none",borderRadius:4,
                    background:isActive?"#1852FE":"transparent",
                    color:isActive?"#fff":"#0F172A",

                    fontFamily:"inherit",transition:"all 0.15s",whiteSpace:"nowrap"}}>
                  {tab}

          </div>

          {/* Vessel card — draggable */}
          {mapVessel && cardPos && (function(){
            var vr = VESSEL_ROUTES[mapVessel.name] || {from:"—",to:"—",dist:0,done:0,dep:"—",arr:"—",pos:"—"};
            return <div
            ref={dragRef}

              background:"#fff",borderRadius:16,

                    return (
                      <div key={group} style={{marginBottom:14}}>
                        <div style={{fontSize:9,fontWeight:700,color:"#94A3B8",letterSpacing:"0.9px",textTransform:"uppercase",marginBottom:7,paddingLeft:1}}>{group}</div>
                        <div style={{display:"flex",flexDirection:"column",gap:3}}>
                          {cols.map(function(c,i){
                            var isCopied=copiedName===c.hex;
                            return (
                              <div key={group+i} title={"Click to copy "+c.hex}
                                style={{display:"flex",alignItems:"center",gap:10,padding:"5px 8px",borderRadius:7,
                                  background:"#F8FAFC",border:"0.5px solid #E2E8F0",cursor:"pointer",transition:"background 0.1s"}}
                                onClick={function(e){e.stopPropagation();copyColorHex(c.hex);}}>
                                <div style={{width:28,height:28,borderRadius:6,background:c.hex,flexShrink:0,
                                  boxShadow:"inset 0 0 0 1px rgba(0,0,0,0.08)"}}/>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{fontSize:11,fontWeight:600,color:"#0F172A",marginBottom:1}}>{c.name}</div>
                                  <div style={{fontSize:9.5,color:"#64748B",lineHeight:1.4}}>{c.usage}</div>
                                </div>
                                <div style={{flexShrink:0,textAlign:"right"}}>
                                  <div style={{fontSize:10.5,fontWeight:700,color:"#1852FE",fontFamily:"monospace",letterSpacing:"0.3px"}}>{isCopied?"Copied!":c.hex}</div>
                                  <div style={{fontSize:9,color:"#94A3B8",fontFamily:"monospace"}}>{"rgb("+hexToRgb(c.hex)+")"}</div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Floating trigger button */}
          <div style={{width:40,height:40,borderRadius:"50%",background:"#001E4C",
            display:"flex",alignItems:"center",justifyContent:"center",
            boxShadow:open?"0 6px 24px rgba(0,30,76,0.55)":"0 4px 16px rgba(0,30,76,0.45)",cursor:"pointer",
            transition:"transform 0.15s,box-shadow 0.15s",
            transform:open?"scale(1.1)":"scale(1)"}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="14" cy="6.5" r="3.5"/>
              <rect x="3" y="3" width="6" height="6" rx="1"/>
              <path d="M3 17.5L6.5 12 10 17.5H3Z"/>
              <rect x="13" y="13" width="7" height="7" rx="1"/>
            </svg>
          </div>
        </div>,
        document.getElementById("tooltip-root")
      );
    }
    // ── end AssetsPanel ────────────────────────────────────────────────────────

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
