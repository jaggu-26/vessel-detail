  if (t.indexOf("emission")!==-1||t.indexOf("co2")!==-1||t.indexOf("cii")!==-1||t.indexOf("ghg")!==-1) return "emissions";
  if (t.indexOf("hull")!==-1||t.indexOf("docking")!==-1||t.indexOf("fouling")!==-1) return "hull";
  if (t.indexOf("speed")!==-1||t.indexOf("consumption")!==-1||t.indexOf("slow steam")!==-1) return "speed";

  return null;

function detectInsightType(t) {
  t = t.toLowerCase();
  if (t.indexOf("trend")!==-1||t.indexOf("consumption")!==-1||t.indexOf("co2")!==-1) return "trend";
  if (t.indexOf("score")!==-1||t.indexOf("rating")!==-1||t.indexOf("cii")!==-1) return "score";
  if (t.indexOf("breakdown")!==-1||t.indexOf("mix")!==-1||t.indexOf("composition")!==-1) return "breakdown";
  if (t.indexOf("vs")!==-1||t.indexOf("actual")!==-1||t.indexOf("benchmark")!==-1) return "comparison";
  if (t.indexOf("schedule")!==-1||t.indexOf("docking")!==-1) return "timeline";
  if (t.indexOf("sensor")!==-1||t.indexOf("alert")!==-1||t.indexOf("maintenance")!==-1) return "alert";
  if (t.indexOf("savings")!==-1||t.indexOf("revenue")!==-1||t.indexOf("profit")!==-1||t.indexOf("earning")!==-1) return "financial";
  return "general";
}
async function fetchInsight(chartTitle, dataPoint, rawData) {
  var insightType = detectInsightType(chartTitle);
  // Generate smart insight from actual chart data
  var parsed = {};
  var tags = [];
  try {
    var nums = [];
    if (Array.isArray(rawData)) {
      rawData.forEach(function(row){
        Object.values(row).forEach(function(v){ if(typeof v==="number") nums.push(v); });
      });
    }
    var latest = nums[nums.length-1]||0;
    var first = nums[0]||1;
    var maxV = Math.max.apply(null,nums)||1;
    var minV = Math.min.apply(null,nums)||0;
    var avg = nums.length ? Math.round(nums.reduce(function(a,b){return a+b;},0)/nums.length) : 0;
    var pct = first ? Math.round(((latest-first)/Math.abs(first))*100) : 0;
    var trend = pct>0?"↑":pct<0?"↓":"→";
    var trendWord = pct>0?"up":"down";
    var keys = rawData&&rawData[0] ? Object.keys(rawData[0]) : [];
    var labelKey = keys[0]||"";
    var firstLabel = rawData&&rawData[0] ? rawData[0][labelKey] : "";
    var lastLabel = rawData&&rawData[rawData.length-1] ? rawData[rawData.length-1][labelKey] : "";

    if (insightType==="trend") {
      parsed = {
        summary: chartTitle+" "+trend+" "+Math.abs(pct)+"% since "+firstLabel,
        direction: trend,
        change: (pct>0?"+":"")+pct+"%",
        insight: "Peak of "+maxV+" reached; avg "+avg+" across period",
        action: pct<0?"Review and reduce consumption":"Maintain current trajectory",
        tags: [pct<0?"Declining":"Improving", "6-month trend"]
      };
    } else if (insightType==="comparison") {
      var k1 = keys[1]||"actual"; var k2 = keys[2]||"target";
      var v1 = rawData&&rawData[rawData.length-1] ? (rawData[rawData.length-1][k1]||0) : 0;
      var v2 = rawData&&rawData[rawData.length-1] ? (rawData[rawData.length-1][k2]||0) : 1;
      var gap = Math.round(v1-v2);
      parsed = {
        summary: (gap>0?k1+" exceeds "+k2+" by "+gap:k1+" below "+k2+" by "+Math.abs(gap)),
        winner: gap>0 ? k1+": "+v1 : k2+": "+v2,
        gap: (gap>0?"+":"")+gap,
        insight: "Latest "+k1+" at "+v1+" vs "+k2+" "+v2,
        action: gap<0?"Close gap — increase "+k1:"Sustain above-target performance",
        tags: [gap>=0?"On target":"Below target", lastLabel]
      };
    } else if (insightType==="score") {
      var scoreKey = keys[1]||keys[0];
      var sorted = rawData.slice().sort(function(a,b){return (b[scoreKey]||0)-(a[scoreKey]||0);});
      var bestRow = sorted[0]||{}; var worstRow = sorted[sorted.length-1]||{};
      parsed = {
        summary: "Fleet avg score: "+avg,
        best: (bestRow[labelKey]||bestRow[keys[0]]||"—")+": "+(bestRow[scoreKey]||"—"),
        worst: (worstRow[labelKey]||worstRow[keys[0]]||"—")+": "+(worstRow[scoreKey]||"—"),
        gap: maxV-minV+" point spread",
        insight: "Top performer leads by "+(maxV-minV)+" pts; 1 vessel needs attention",
        action: "Focus improvement on lowest scoring vessel",
        tags: ["Fleet performance","Score gap: "+(maxV-minV)]
      };
    } else if (insightType==="breakdown") {
      var valKey = keys[1]||"value";
      var sortedB = rawData.slice().sort(function(a,b){return (b[valKey]||0)-(a[valKey]||0);});
      var dom = sortedB[0]||{}; var small = sortedB[sortedB.length-1]||{};
      parsed = {
        summary: (dom[keys[0]]||"Top")+" dominates at "+(dom[valKey]||0)+"%",
        dominant: (dom[keys[0]]||"—")+": "+(dom[valKey]||0)+"%",
        smallest: (small[keys[0]]||"—")+": "+(small[valKey]||0)+"%",
        insight: "Top 2 categories represent "+(((dom[valKey]||0)+(sortedB[1]?sortedB[1][valKey]:0)))+"%",
        recommendation: "Review "+small[keys[0]]+" segment for reallocation",
        tags: ["Composition","Top: "+(dom[keys[0]]||"—")]
      };
    } else if (insightType==="financial") {
      var fKey = keys[1]||"value";
      var sortedF = rawData.slice().sort(function(a,b){return (b[fKey]||0)-(a[fKey]||0);});
      var topF = sortedF[0]||{};
      parsed = {
        summary: "Max "+maxV+" — avg $"+avg+" across fleet",
        topPerformer: (topF[keys[0]]||"—")+": $"+(topF[fKey]||0),
        potential: "$"+(Math.round((maxV-avg)*0.8))+" upside if fleet matches top",
        margin: Math.round((avg/maxV)*100)+"%",
        insight: "Fleet earns "+Math.round((avg/maxV)*100)+"% of top performer level",
        action: "Replicate top performer strategies across fleet",
        tags: ["Revenue","Optimisation"]
      };
    } else if (insightType==="alert") {
      var alertKey = keys[1]||"load";
      var critical = rawData.filter(function(r){return (r[alertKey]||0)>80;}).length;
      var normal = rawData.length - critical;
      parsed = {
        summary: critical+" systems need attention out of "+rawData.length,
        critical: critical+" system"+(critical!==1?"s":""),
        normal: normal+" system"+(normal!==1?"s":""),
        status: critical>2?"critical":critical>0?"caution":"ok",
        insight: Math.round((normal/rawData.length)*100)+"% systems running normally",
        action: critical>0?"Schedule maintenance for critical systems":"Continue monitoring",
        tags: [critical>0?"Action required":"All clear","Systems: "+rawData.length]
      };
    } else if (insightType==="timeline") {
      var dayKey = keys[1]||"days";
      var sortedT = rawData.slice().sort(function(a,b){return (a[dayKey]||0)-(b[dayKey]||0);});
      var urgent = sortedT[0]||{}; var upcoming = sortedT[1]||{};
      parsed = {
        summary: (urgent[keys[0]]||"—")+" due in "+(urgent[dayKey]||0)+" days",
        urgent: (urgent[keys[0]]||"—")+" — "+(urgent[dayKey]||0)+" days",
        upcoming: (upcoming[keys[0]]||"—")+" — "+(upcoming[dayKey]||0)+" days",
        risk: (urgent[dayKey]||0)<30?"high":(urgent[dayKey]||0)<90?"medium":"low",
        insight: rawData.length+" items tracked; "+rawData.filter(function(r){return (r[dayKey]||0)<30;}).length+" due within 30 days",
        action: "Prepare "+urgent[keys[0]]+" for immediate scheduling",
        tags: ["Scheduling",(urgent[dayKey]||0)<30?"Urgent":"On track"]
      };
    } else {
      parsed = {
        summary: chartTitle+": "+latest+" ("+trend+" "+Math.abs(pct)+"% vs start)",
        keyMetric: latest+" units",
        status: pct>=-5?"good":pct>=-15?"neutral":"needs attention",
        insight: "Range "+minV+"–"+maxV+"; avg "+avg+" over period",
        action: pct<-10?"Investigate declining trend":"Monitor and maintain",
        tags: [pct>=0?"Positive trend":"Watch closely","Avg: "+avg]
      };
    }
  } catch(e) {
    parsed = {summary:chartTitle+" analysis",keyMetric:"See chart",status:"neutral",insight:"Review data trends over the period",action:"Monitor regularly",tags:["Analytics"]};
  }
  // Simulate brief loading delay for realism
  await new Promise(function(r){setTimeout(r,600);});
  return {parsed:parsed, insightType:insightType, tags:parsed.tags||[]};
}

              </ComposedChart>

          </div>

    </div>
  );
}

// ── Dual Range Slider ────────────────────────────────────────────────────────
function DualRangeSlider({min, max, low, high, onChange}) {
  var lp = ((low-min)/(max-min)*100);
  var hp = ((high-min)/(max-min)*100);
  return (
    <div style={{position:"relative",height:20,display:"flex",alignItems:"center",margin:"2px 0"}}>
      <div style={{position:"absolute",left:0,right:0,height:4,borderRadius:2,background:"#E2E8F0",pointerEvents:"none"}}>
        <div style={{position:"absolute",height:"100%",left:lp+"%",right:(100-hp)+"%",background:"#1852FE",borderRadius:2}}/>
      </div>
      <div style={{position:"absolute",width:12,height:12,borderRadius:"50%",background:"#1852FE",border:"2px solid #fff",boxShadow:"0 1px 4px rgba(24,82,254,0.35)",left:lp+"%",transform:"translateX(-50%)",pointerEvents:"none",zIndex:2}}/>
      <div style={{position:"absolute",width:12,height:12,borderRadius:"50%",background:"#1852FE",border:"2px solid #fff",boxShadow:"0 1px 4px rgba(24,82,254,0.35)",left:hp+"%",transform:"translateX(-50%)",pointerEvents:"none",zIndex:2}}/>
      <input type="range" min={min} max={max} value={low}
        onChange={function(e){var v=Math.min(+e.target.value,high-1);onChange(v,high);}}
        style={{position:"absolute",width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:low>=(high-5)?4:3,margin:0,padding:0,WebkitAppearance:"none"}}/>
      <input type="range" min={min} max={max} value={high}
        onChange={function(e){var v=Math.max(+e.target.value,low+1);onChange(low,v);}}
        style={{position:"absolute",width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:4,margin:0,padding:0,WebkitAppearance:"none"}}/>
    </div>
  );
}

  var MNTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  var FG_ALL = ["FO","GO","MGO"];

    var rows=[]; var base=new Date(2025,0,1,0,0);

      var mo=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][d.getMonth()];

      var sog=parseFloat((8.5+((i*17+7)%100)/10).toFixed(1));
      rows.push({voyageNum:202500+i,dateStr:dateStr,hours:HC_ALL[i%5],reportType:RT_ALL[i%6],loadCondition:LC_ALL[i%2],fuelGroup:FG_ALL[i%3],sog:sog,month:d.getMonth()});
    }
    return rows;

  var DEFAULT_F = {loadCondition:"Laden", reportTypes:{Noon:false,Departure:true,Arrival:false}, speedRange:[10,40]};

  var _afc=useState(0); var activeFilterCount=_afc[0]; var setActiveFilterCount=_afc[1];

  var filteredRows = ALL_ROWS.filter(function(row){

    if(checkedTypes.length>0 && !checkedTypes.includes(row.reportType)) return false;
    if(row.sog < appliedF.speedRange[0] || row.sog > appliedF.speedRange[1]) return false;
    return true;

  var monthlyCounts = Array(12).fill(0);

function DailyTasksAccordion(props) {
  var onSendMsg = props.onSendMsg;

          style={{transform:open?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",flexShrink:0}}>

        </svg>

            var itemBorder = task.priority==="high" ? "#fde8e8" : task.priority==="medium" ? "#fdefd8" : "#dce8ff";

                style={{padding:"12px 14px",borderRadius:10,

                  border:"1.5px solid "+(isHovered ? hoverBorder : itemBorder),

                      cursor:"pointer",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>

                      <span style={{fontSize:14,color:THEME.textMuted}}>— {task.vessel}</span>
                      <span style={{fontSize:14,fontWeight:700,background:ps.bg,color:ps.color,borderRadius:20,padding:"1px 7px",marginLeft:"auto"}}>{ps.label}</span>
                    </div>
                    <div style={{fontSize:14,color:"#777",lineHeight:1.55,marginBottom:6,textDecoration:isDone?"line-through":"none"}}>{task.desc}</div>
                    {!isDone && (
                      <button onClick={function(){onSendMsg(task.action);}}
                        style={{background:"none",border:"none",padding:0,cursor:"pointer",fontSize:14,color:B,fontWeight:600,
                          textDecoration:"underline",textDecorationStyle:"dotted",textUnderlineOffset:2}}>
                        → {task.tag === "Compliance" ? "Review & fix" : task.tag === "Maintenance" ? "Schedule now" : task.tag === "Reports" ? "Resolve report" : task.tag === "Machinery" ? "Check machinery" : "Optimise speed"}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
          {remaining === 0 && (
            <div style={{padding:"12px 14px",textAlign:"center",fontSize:14,color:"#0F6E56",fontWeight:600,borderRadius:10,background:"#e8f7f0",border:"1px solid #b8e6d2"}}>
              ✅ All tasks cleared for today!
            </div>
          )}
        </div>
      )}
    </div>
  );
}

                    animation:isFlashing?"flashIn 0.5s ease":"none"}}>
                    {m.role==="user"?(
                      <div style={{maxWidth:"88%",padding:"10px 14px",borderRadius:10,fontSize:14,lineHeight:1.5,
                        background:B,color:"#fff",borderBottomRightRadius:2,
                        boxShadow:isFlashing?"0 0 0 3px "+B+"44, 0 4px 16px "+B+"55":"none",
                        transition:"box-shadow 0.4s"}}>{m.text}</div>
                    ):(
                      <div style={{maxWidth:"95%",display:"flex",flexDirection:"column",gap:10,
                        borderRadius:10,padding:isFlashing?"8px":"0",
                        background:isFlashing?"#f0f4ff":"transparent",
                        boxShadow:isFlashing?"0 0 0 2px "+B+"22":"none",
                        transition:"background 0.4s,box-shadow 0.4s"}}>
                        {m.data&&m.data.type==="structured"?(
                          <>
                            {m.data.summary&&<div style={{fontSize:13,color:"#555",lineHeight:1.7,padding:"2px 0"}}>{m.data.summary}</div>}
                            {m.data.points&&m.data.points.length>0&&(
                              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                                {m.data.points.map(function(pt,pi){return (
                                  <div key={pi} style={{display:"flex",alignItems:"flex-start",gap:8,background:B+"12",borderLeft:"3px solid "+B,borderRadius:"0 8px 8px 0",padding:"9px 12px"}}>
                                    <span style={{color:B,fontWeight:700,fontSize:13,flexShrink:0,lineHeight:"20px"}}>·</span>
                                    <span style={{fontSize:13,color:"#333",lineHeight:1.6}}>{pt}</span>
                                  </div>
                                );})}
                              </div>
                            )}
                            {m.data.action&&(
                              <div style={{display:"flex",alignItems:"flex-start",gap:8,background:THEME.bg==="#0f1117"?"#0a2018":"#E1F5EE",borderLeft:"3px solid #0F6E56",borderRadius:"0 8px 8px 0",padding:"9px 12px"}}>
                                <span style={{fontSize:12,flexShrink:0,lineHeight:"20px"}}>🎯</span>
                                <span style={{fontSize:13,color:"#0F6E56",lineHeight:1.6,fontWeight:600}}>{m.data.action}</span>
                              </div>
                            )}
                            {m.hasChart&&m.chartMeta&&(
                              <div style={{background:THEME.surfaceAlt,borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:6}}>
                                <div style={{fontSize:12,fontWeight:700,color:"#0c1e35"}}>{m.chartMeta.title}</div>
                                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                                  {m.chartMeta.stats.map(function(s,si){return (
                                    <div key={si} style={{background:"#fff",borderRadius:6,padding:"4px 10px",border:"0.5px solid "+B+"30"}}>
                                      <div style={{fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:0.5}}>{s.label}</div>
                                      <div style={{fontSize:13,fontWeight:700,color:"#0c1e35"}}>{s.value}</div>
                                    </div>
                                  );})}
                                </div>
                              </div>
                            )}
                          </>
                        ):(
                          <div style={{padding:"10px 14px",borderRadius:10,fontSize:14,lineHeight:1.6,background:T.surfaceAlt,color:T.text,borderBottomLeftRadius:2}}>
                            {m.text||(m.data&&m.data.text)}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
              {loading&&(
                <div style={{display:"flex"}}>
                  <div style={{background:T.surfaceAlt,borderRadius:10,borderBottomLeftRadius:2,padding:"7px 12px",fontSize:12,color:T.textMuted}}>
                    <span style={{display:"inline-flex",gap:3}}>
                      {[0,1,2].map(function(i){return <span key={i} style={{animation:"blink 1.2s infinite",animationDelay:(i*0.3)+"s"}}>•</span>;}) }
                    </span>
                  </div>
                </div>
              )}
              <div ref={chatEndRef}/>
            </div>

            <div style={{padding:"9px 10px",borderTop:"0.5px solid "+(followUpTitle?B:T.border),background:T.surface,position:"relative",transition:"border-color 0.3s"}}>
              <div style={{position:"relative"}}>
                <input value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")sendMsg();}}
                  style={{width:"100%",padding:input.trim()?"14px 48px 14px 14px":"14px 40px 14px 14px",borderRadius:8,
                    border:"1px solid "+(followUpTitle?B:T.inputBorder),fontSize:14,outline:"none",
                    color:T.text,background:T.inputBg,transition:"border 0.2s",boxSizing:"border-box",
                    boxShadow:followUpTitle?"0 0 0 3px "+B+"18":"none"}}/>
                {!input&&<AnimatedPlaceholder/>}
                {input.trim()?(
                  <button onClick={function(){sendMsg();}}
                    style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",width:28,height:28,borderRadius:6,background:B,border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                  </button>
                ):(
                  <button title="Voice input"
                    style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",width:28,height:28,borderRadius:6,background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
                  </button>
                )}
              </div>
            </div>
          </div>}
        </div>
      </div>
      <style>{"@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap'); @keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}} @keyframes flashIn{0%{opacity:0.4;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}"}</style>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
