    function VesselSearch({selectedVessel, onSelectVessel, onClear, open, setOpen, hideEmptyDropdown, alwaysOpen}) {
      var [query, setQuery] = useState("");
      var [recentSearches, setRecentSearches] = useState([]);
      var inputRef = useRef(null);
      var wrapRef = useRef(null);

      // When alwaysOpen, treat as always open — never close on outside click
      useEffect(function(){
        if(!open && !alwaysOpen) return;
        if(!alwaysOpen) setTimeout(function(){ if(inputRef.current) inputRef.current.focus(); }, 50);
        if(alwaysOpen) return; // no outside-click listener when always open
        function handleClick(e){ if(wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
        document.addEventListener("mousedown", handleClick);
        return function(){ document.removeEventListener("mousedown", handleClick); };
      }, [open, alwaysOpen]);

      // When alwaysOpen, sync query to selected vessel name; clear when deselected
      useEffect(function(){
        if(alwaysOpen && selectedVessel) setQuery(selectedVessel.name);
        else if(alwaysOpen && !selectedVessel) setQuery("");
      }, [alwaysOpen, selectedVessel && selectedVessel.name]);

      var trimmed = query.trim();
      var isShowingSelected = alwaysOpen && selectedVessel && trimmed.toLowerCase() === selectedVessel.name.toLowerCase();
      var filtered = (function(){
        var list = trimmed === ""
          ? VESSEL_LIST
          : VESSEL_LIST.filter(function(v){
              var q = trimmed.toLowerCase();
              return v.name.toLowerCase().includes(q) || v.imo.toLowerCase().includes(q) || v.type.toLowerCase().includes(q);
            });
        if(!selectedVessel) return list;
        var others = list.filter(function(v){ return v.name !== selectedVessel.name; });
        var active = list.find(function(v){ return v.name === selectedVessel.name; });
        return active ? [active].concat(others) : others;
      })();

      function handleSelect(v){
        onSelectVessel(v);
        setRecentSearches(function(prev){
          var next = [v].concat(prev.filter(function(r){ return r.name !== v.name; }));
          return next.slice(0, 5);
        });
        setQuery("");
        setOpen(false);
      }

      function VesselRow({v, isActive, showClock}){
        var iconBg = getVesselColor(v.type);
        var nameEl;
        if(trimmed){
          var q=trimmed; var idx=v.name.toLowerCase().indexOf(q.toLowerCase());
          if(idx>=0){
            nameEl=<span style={{fontSize:14,fontWeight:600,color:THEME.text}}>
              {v.name.slice(0,idx)}
              <span style={{color:B,fontWeight:700}}>{v.name.slice(idx,idx+q.length)}</span>
              {v.name.slice(idx+q.length)}
            </span>;
          } else { nameEl=<span style={{fontSize:14,fontWeight:600,color:THEME.text}}>{v.name}</span>; }
        } else { nameEl=<span style={{fontSize:14,fontWeight:600,color:THEME.text}}>{v.name}</span>; }

        return (
          <div onClick={function(){handleSelect(v);}}
            style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",cursor:"pointer",
              background:isActive?"#F4F6F9":"#fff",transition:"background 0.1s"}}
            onMouseEnter={function(e){e.currentTarget.style.background="#F4F6F9";}}
            onMouseLeave={function(e){e.currentTarget.style.background=isActive?"#F4F6F9":"#fff";}}>
            {showClock ? (
              <div style={{width:36,height:36,borderRadius:8,background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
              </div>
            ) : (
              <VesselIcon size={36} bg={iconBg}/>
            )}
            <div style={{flex:1,minWidth:0}}>
              <div style={{marginBottom:4}}>{nameEl}</div>
              <div style={{fontSize:12,color:"#94A3B8",fontWeight:400}}>
                {v.imo.replace("IMO ","")} <span style={{margin:"0 3px"}}>|</span> {v.type}{v.range&&<span><span style={{margin:"0 3px"}}>|</span>{v.range}</span>}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div ref={wrapRef} style={{position:"relative"}}>
          {/* Search trigger icon — hidden when alwaysOpen */}
          {!open && !alwaysOpen && (
            <button onClick={function(){setOpen(true);}}
              title="Search Vessel or IMO"
              style={{background:"#102a57",border:"0.5px solid rgba(255,255,255,0.1)",borderRadius:8,
                cursor:"pointer",width:36,height:36,padding:0,
                display:"flex",alignItems:"center",justifyContent:"center",
                color:"#ffffff",boxSizing:"border-box",
                transition:"border 0.2s ease", flexShrink:0}}
              onMouseEnter={function(e){e.currentTarget.style.border="1.5px solid rgba(255,255,255,0.1)";}}
              onMouseLeave={function(e){e.currentTarget.style.border="0.5px solid rgba(255,255,255,0.1)";}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </button>
          )}

          {/* Expanded search box */}
          {(open || alwaysOpen) && (
            <div style={{position:"relative",width:"100%"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,height:40,background:"#fff",
                border: (trimmed && !isShowingSelected) ? "1.5px solid "+B : "1.5px solid #E2E8F0",
                borderRadius:4,padding:"0 10px",
                boxShadow: (trimmed && !isShowingSelected) ? "0 0 0 3px rgba(24,82,254,0.08)" : "none",
                transition:"border-color 0.15s, box-shadow 0.15s"}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={(trimmed && !isShowingSelected)?B:"#94A3B8"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input ref={inputRef} value={query} onChange={function(e){setQuery(e.target.value);}}
                  placeholder="Search Vessel or IMO"
                  style={{flex:1,border:"none",outline:"none",fontSize:13,color:THEME.text,background:"transparent",fontFamily:"inherit"}}/>
                {query && (
                  <button onClick={function(){
                    setQuery("");
                    if(alwaysOpen && isShowingSelected && onClear) onClear();
                  }} style={{border:"none",background:"none",cursor:"pointer",padding:0,color:THEME.textMuted,display:"flex",alignItems:"center"}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
                  </button>
                )}
              </div>

              {/* Dropdown */}
              {!isShowingSelected && (hideEmptyDropdown ? trimmed.length > 0 : true) && <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,minWidth:240,background:"#fff",
                borderRadius:12,border:"1px solid #E2E8F0",boxShadow:"0 12px 32px rgba(0,0,0,0.12)",
                zIndex:9999,overflow:"hidden",maxHeight:360,overflowY:"auto"}}>

                {!trimmed && recentSearches.length > 0 ? (
                  <React.Fragment>
                    {/* Recent searches section */}
                    <div style={{padding:"10px 14px 6px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"0.06em"}}>Recent Searches</span>
                      <button onClick={function(){setRecentSearches([]);}}
                        style={{border:"none",background:"none",cursor:"pointer",fontSize:11,color:B,fontWeight:600,padding:0,fontFamily:"inherit"}}>
                        Clear
                      </button>
                    </div>
                    {recentSearches.map(function(v){
                      var isActive = selectedVessel && selectedVessel.name === v.name;
                      return <VesselRow key={v.name} v={v} isActive={isActive} showClock={true}/>;
                    })}
                    <div style={{height:1,background:"#F1F5F9",margin:"6px 0"}}/>
                    <div style={{padding:"6px 14px 4px"}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"0.06em"}}>All Vessels</span>
                    </div>
                    {filtered.slice(0,6).map(function(v){
                      var isActive = selectedVessel && selectedVessel.name === v.name;
                      return <VesselRow key={v.name} v={v} isActive={isActive} showClock={false}/>;
                    })}
                  </React.Fragment>
                ) : trimmed && filtered.length === 0 ? (
                  /* No results empty state */
                  <div style={{padding:"28px 20px",textAlign:"center"}}>
                    <div style={{width:44,height:44,borderRadius:12,background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        <path d="M8 11h6M11 8v6" stroke="#CBD5E1" strokeWidth="1.5"/>
                      </svg>
                    </div>
                    <div style={{fontSize:14,fontWeight:700,color:"#1E293B",marginBottom:6}}>No vessel found</div>
                    <div style={{fontSize:12,color:"#64748B",lineHeight:1.6,maxWidth:200,margin:"0 auto"}}>
                      We couldn't find a vessel matching <span style={{fontWeight:600,color:"#334155"}}>"{trimmed}"</span>
                    </div>
                    <div style={{marginTop:10,fontSize:11,color:"#94A3B8"}}>Try searching by vessel name or IMO number</div>
                  </div>
                ) : (
                  filtered.map(function(v){
                    var isActive = selectedVessel && selectedVessel.name === v.name;
                    return <VesselRow key={v.name} v={v} isActive={isActive} showClock={false}/>;
                  })
                )}
              </div>}
            </div>
          )}
        </div>
      );
    }

    // ── Compare Modal ─────────────────────────────────────────────────────────
    function CompareModal({currentVessel, onClose, onCompare}) {
      var [query, setQuery] = useState("");
      var [selected, setSelected] = useState([]);
      var [overLimit, setOverLimit] = useState(false);
      var inputRef = useRef(null);
      var filtered = VESSEL_LIST.filter(function(v){
        if(currentVessel && v.name === currentVessel.name) return false;
        var q = query.toLowerCase();
        return !q || v.name.toLowerCase().includes(q) || v.imo.toLowerCase().includes(q) || v.type.toLowerCase().includes(q);
      });
      function toggleVessel(v) {
        var isSelected = selected.some(function(s){ return s.name === v.name; });
        if(isSelected) {
          setSelected(selected.filter(function(s){ return s.name !== v.name; }));
          setOverLimit(false);
        } else {
          if(selected.length >= 3) { setOverLimit(true); return; }
          setSelected(selected.concat([v]));
          setOverLimit(false);
          setQuery("");
        }
      }
      function removeTag(v) {
        setSelected(selected.filter(function(s){ return s.name !== v.name; }));
        setOverLimit(false);
      }
      return ReactDOM.createPortal(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:99999,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
          <div style={{background:"#fff",borderRadius:16,width:540,maxWidth:"95vw",maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
            {/* Header */}
            <div style={{padding:"28px 28px 0",position:"relative"}}>
              <button onClick={onClose} style={{position:"absolute",top:20,right:20,background:"none",border:"none",cursor:"pointer",padding:4,borderRadius:6,color:"#64748B",fontSize:20,lineHeight:1}}>✕</button>
              <div style={{fontWeight:700,fontSize:22,color:"#0F172A",textAlign:"center",marginBottom:6}}>Select Vessels to Compare</div>
              {overLimit
                ? <div style={{textAlign:"center",fontSize:15,color:"#EF4444",fontWeight:500,marginBottom:16}}>Damn! Compare up-to 3 vessels max</div>
                : <div style={{textAlign:"center",fontSize:15,color:"#64748B",marginBottom:16}}>You can select up to 3 vessels at a time</div>
              }
              {/* Search + tags */}
              <div onClick={function(){inputRef.current&&inputRef.current.focus();}}
                style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:6,minHeight:44,padding:"6px 12px",border:"1.5px solid #CBD5E1",borderRadius:10,cursor:"text",marginBottom:4}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                {selected.map(function(v){
                  return (
                    <span key={v.name} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#F1F5F9",border:"1px solid #CBD5E1",borderRadius:20,padding:"2px 8px 2px 10px",fontSize:13,fontWeight:500,color:"#334155"}}>
                      {v.name}
                      <button onClick={function(e){e.stopPropagation();removeTag(v);}}
                        style={{background:"none",border:"none",cursor:"pointer",padding:0,lineHeight:1,color:"#94A3B8",fontSize:14,display:"flex",alignItems:"center"}}>✕</button>
                    </span>
                  );
                })}
                <input ref={inputRef} value={query} onChange={function(e){setQuery(e.target.value);setOverLimit(false);}}
                  placeholder={selected.length===0?"Search Vessel or IMO":""}
                  style={{border:"none",outline:"none",fontSize:14,color:"#334155",flex:1,minWidth:80,background:"transparent",padding:"2px 0"}}/>
              </div>
            </div>
            {/* Vessel list */}
            <div style={{flex:1,overflowY:"auto",padding:"8px 16px 8px"}}>
              {filtered.map(function(v){
                var isSel = selected.some(function(s){ return s.name === v.name; });
                return (
                  <div key={v.name} onClick={function(){toggleVessel(v);}}
                    style={{display:"flex",alignItems:"center",gap:14,padding:"10px 12px",borderRadius:10,cursor:"pointer",
                      background:isSel?"#EEF6FF":"transparent",marginBottom:2,transition:"background 0.12s"}}
                    onMouseEnter={function(e){if(!isSel)e.currentTarget.style.background="#F8FAFC";}}
                    onMouseLeave={function(e){e.currentTarget.style.background=isSel?"#EEF6FF":"transparent";}}>
                    <VesselIcon size={44} bg={getVesselColor(v.type)}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:15,color:isSel?"#1852FE":"#1E293B"}}>{v.name}</div>
                      <div style={{fontSize:13,color:"#94A3B8",marginTop:1}}>{v.imo.replace("IMO ","")} | {v.type}</div>
                    </div>
                    {isSel && (
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1852FE" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    )}
                  </div>
                );
              })}
              {filtered.length===0&&<div style={{textAlign:"center",color:"#94A3B8",padding:"24px 0",fontSize:14}}>No vessels found</div>}
            </div>
            {/* Footer */}
            <div style={{padding:"16px 28px 24px",display:"flex",gap:14,borderTop:"1px solid #F1F5F9"}}>
              <button onClick={onClose}
                style={{flex:1,height:48,borderRadius:10,border:"1.5px solid #1852FE",background:"#EEF6FF",cursor:"pointer",fontSize:15,fontWeight:600,color:"#1852FE",transition:"all 0.15s"}}
                onMouseEnter={function(e){e.currentTarget.style.background="#dbeafe";}}
                onMouseLeave={function(e){e.currentTarget.style.background="#EEF6FF";}}>
                Cancel
              </button>
              <button
                onClick={function(){if(selected.length>0&&onCompare){onCompare(selected);onClose();}}}
                style={{flex:1,height:48,borderRadius:10,border:"none",background:selected.length>0?"#1852FE":"#94A3B8",cursor:selected.length>0?"pointer":"not-allowed",fontSize:15,fontWeight:600,color:"#fff",transition:"all 0.15s"}}
                onMouseEnter={function(e){if(selected.length>0)e.currentTarget.style.background="#1240d6";}}
                onMouseLeave={function(e){e.currentTarget.style.background=selected.length>0?"#1852FE":"#94A3B8";}}>
                Compare
              </button>
            </div>
          </div>
        </div>,
        document.getElementById('tooltip-root')
      );
    }
    // ── end Compare Modal ──────────────────────────────────────────────────────

    // ── Dual Range Slider ─────────────────────────────────────────────────────
    function DualRangeSlider({min, max, low, high, onChange}) {
      var lp = ((low-min)/(max-min)*100);
      var hp = ((high-min)/(max-min)*100);
      return (
        <div style={{position:"relative",height:20,display:"flex",alignItems:"center",margin:"2px 0"}}>
          <div style={{position:"absolute",left:0,right:0,height:4,borderRadius:2,background:"#E2E8F0",pointerEvents:"none"}}>
            <div style={{position:"absolute",height:"100%",left:lp+"%",right:(100-hp)+"%",background:"#1852FE",borderRadius:2}}/>
          </div>
          <div style={{position:"absolute",width:12,height:12,borderRadius:"50%",background:"#1852FE",border:"2px solid #fff",boxShadow:"0 1px 4px rgba(24,82,254,0.35)",left:lp+"%",transform:"translateX(-50%)",pointerEvents:"none",zIndex:2}}/>
          <div style={{position:"absolute",width:12,height:12,borderRadius:"50%",background:"#1852FE",border:"2px solid #fff",boxShadow:"0 1px 4px rgba(24,82,254,0.35)",left:hp+"%",transform:"translateX(-50%)",pointerEvents:"none",zIndex:2}}/>
          <input type="range" min={min} max={max} value={low}
            onChange={function(e){var v=Math.min(+e.target.value,high-1);onChange(v,high);}}
            style={{position:"absolute",width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:low>=(high-5)?4:3,margin:0,padding:0,WebkitAppearance:"none"}}/>
          <input type="range" min={min} max={max} value={high}
            onChange={function(e){var v=Math.max(+e.target.value,low+1);onChange(low,v);}}
            style={{position:"absolute",width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:4,margin:0,padding:0,WebkitAppearance:"none"}}/>
        </div>
      );
    }

    // ── Add Metric Modal ──────────────────────────────────────────────────────
    function AddMetricModal({selected, onApply, onClose}) {
      // Pre-select recommended metrics by default if nothing passed in
      var defaultSel = (function(){
        if(selected && Object.keys(selected).length > 0) return selected;
        var d = {};
        COMP_METRICS_DEF.forEach(function(m){ if(m.recommended) d[m.id]=true; });
        return d;
      })();
      var [search, setSearch] = useState("");
      var [activeTab, setActiveTab] = useState("All");
      var [sel, setSel] = useState(defaultSel);
      var searchRef = useRef(null);
      var MTABS = ["All","Operational","Technical","Environmental","LNG KPIs"];
      var GROUP_COLOR = {Operational:"#B45309",Technical:"#7C3AED",Environmental:"#0F6E56","LNG KPIs":"#0369A1"};
      var GROUP_BG    = {Operational:"#FFFBEB",Technical:"#F5F3FF",Environmental:"#ECFDF5","LNG KPIs":"#F0F9FF"};

      useEffect(function(){
        setTimeout(function(){ if(searchRef.current) searchRef.current.focus(); }, 80);
      },[]);

      var filtered = COMP_METRICS_DEF.filter(function(m){
        var tabOk = activeTab==="All" || m.group===activeTab || m.tab===activeTab;
        var searchOk = !search.trim() || m.label.toLowerCase().includes(search.toLowerCase());
        return tabOk && searchOk;
      });

      // Group filtered metrics
      var grouped = {};
      filtered.forEach(function(m){
        var g = m.group;
        if(!grouped[g]) grouped[g]=[];
        grouped[g].push(m);
      });

      var selCount = Object.values(sel).filter(Boolean).length;

      function toggle(id){ setSel(function(p){ return Object.assign({},p,{[id]:!p[id]}); }); }
      function toggleGroup(ids, allOn){
        setSel(function(p){
          var next=Object.assign({},p);
          ids.forEach(function(id){ next[id]=!allOn; });
          return next;
        });
      }

      return (
        <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,23,42,0.45)"}}>
          <div style={{background:"#fff",borderRadius:16,width:560,maxHeight:"82vh",display:"flex",flexDirection:"column",
            overflow:"hidden"}}>

            {/* Header */}
            <div style={{padding:"22px 24px 0",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:4}}>
                <div>
                  <div style={{fontWeight:700,fontSize:18,color:"#0F172A"}}>Add Metrics</div>
                  <div style={{fontSize:13,color:"#94A3B8",marginTop:3}}>Select metrics to add to the comparison table</div>
                </div>
                <button onClick={onClose}
                  style={{width:32,height:32,borderRadius:8,border:"none",background:"#F1F5F9",cursor:"pointer",
                    display:"flex",alignItems:"center",justifyContent:"center",color:"#64748B",flexShrink:0,marginTop:2}}
                  onMouseEnter={function(e){e.currentTarget.style.background="#E2E8F0";}}
                  onMouseLeave={function(e){e.currentTarget.style.background="#F1F5F9";}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
              </div>

              {/* Search */}
              <div style={{display:"flex",alignItems:"center",gap:8,height:38,background:"#F8FAFC",
                border:"1.5px solid #E2E8F0",borderRadius:8,padding:"0 12px",margin:"14px 0 0",
                transition:"border-color 0.15s"}}
                onFocusCapture={function(e){e.currentTarget.style.borderColor="#1852FE";e.currentTarget.style.background="#fff";}}
                onBlurCapture={function(e){e.currentTarget.style.borderColor="#E2E8F0";e.currentTarget.style.background="#F8FAFC";}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input ref={searchRef} value={search} onChange={function(e){setSearch(e.target.value);}}
                  placeholder="Search metrics…"
                  style={{flex:1,border:"none",outline:"none",fontSize:13,color:"#0F172A",background:"transparent",fontFamily:"inherit"}}/>
                {search&&<button onClick={function(){setSearch("");}} style={{border:"none",background:"none",cursor:"pointer",padding:0,color:"#94A3B8",display:"flex",alignItems:"center"}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>}
              </div>

              {/* Category tabs */}
              <div style={{display:"flex",gap:0,marginTop:12,borderBottom:"1px solid #F1F5F9",overflowX:"auto"}}>
                {MTABS.map(function(t){
                  var isA=activeTab===t;
                  return (
                    <button key={t} onClick={function(){setActiveTab(t);}}
                      style={{padding:"8px 14px",border:"none",background:"transparent",cursor:"pointer",
                        fontSize:12,fontWeight:isA?700:500,color:isA?"#1852FE":"#64748B",
                        borderBottom:isA?"2px solid #1852FE":"2px solid transparent",
                        whiteSpace:"nowrap",fontFamily:"inherit",transition:"all 0.15s",flexShrink:0}}>
                      {t}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Metric list */}
            <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
              {Object.keys(grouped).length===0&&(
                <div style={{padding:"32px 24px",textAlign:"center",color:"#94A3B8",fontSize:13}}>No metrics found</div>
              )}
              {Object.keys(grouped).map(function(group){
                var items=grouped[group];
                var allOn=items.every(function(m){return sel[m.id];});
                var someOn=!allOn&&items.some(function(m){return sel[m.id];});
                var gc=GROUP_COLOR[group]||"#1852FE";
                var gb=GROUP_BG[group]||"#EEF6FF";
                return (
                  <div key={group}>
                    {/* Group header */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"10px 24px 6px",background:"#FAFAFA",
                      borderTop:"1px solid #F1F5F9",borderBottom:"1px solid #F1F5F9"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:gc,flexShrink:0}}/>
                        <span style={{fontSize:11,fontWeight:700,color:"#64748B",letterSpacing:"0.06em",textTransform:"uppercase"}}>{group}</span>
                        <span style={{fontSize:11,color:"#CBD5E1",fontWeight:500}}>{items.length}</span>
                      </div>
                      {/* Select all toggle for group */}
                      <button onClick={function(){toggleGroup(items.map(function(m){return m.id;}),allOn);}}
                        style={{fontSize:11,fontWeight:600,color:allOn?gc:"#94A3B8",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",padding:0}}>
                        {allOn?"Deselect all":"Select all"}
                      </button>
                    </div>
                    {/* Items */}
                    {items.map(function(m){
                      var on=!!sel[m.id];
                      return (
                        <div key={m.id} onClick={function(){toggle(m.id);}}
                          style={{display:"flex",alignItems:"center",gap:12,padding:"10px 24px",cursor:"pointer",
                            background:on?"#F8FAFF":"#fff",transition:"background 0.1s",
                            borderBottom:"1px solid #F8FAFC"}}
                          onMouseEnter={function(e){if(!on)e.currentTarget.style.background="#F8FAFC";}}
                          onMouseLeave={function(e){e.currentTarget.style.background=on?"#F8FAFF":"#fff";}}>
                          {/* Checkbox */}
                          <div style={{width:17,height:17,borderRadius:4,flexShrink:0,
                            border:"1.5px solid "+(on?"#1852FE":"#CBD5E1"),
                            background:on?"#1852FE":"#fff",
                            display:"flex",alignItems:"center",justifyContent:"center",
                            transition:"all 0.15s"}}>
                            {on&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:on?600:400,color:on?"#0F172A":"#374151",lineHeight:"1.3"}}>{m.label}</div>
                            {m.subgroup&&<div style={{fontSize:11,color:"#94A3B8",marginTop:1}}>{m.subgroup}</div>}
                          </div>
                          {m.recommended&&(
                            <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0,color:"#7C3AED",fontSize:11,fontWeight:600}}>
                              <svg width="10" height="10" viewBox="0 0 24 24" fill="#7C3AED" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                              Recommended
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>

            {/* Footer */}
            <div style={{padding:"14px 24px",borderTop:"1px solid #F1F5F9",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:"#fff"}}>
              <div style={{fontSize:13,color:"#64748B"}}>
                {selCount>0
                  ? <span><span style={{fontWeight:700,color:"#0F172A"}}>{selCount}</span> metric{selCount!==1?"s":""} selected</span>
                  : <span style={{color:"#94A3B8"}}>No metrics selected</span>}
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={onClose}
                  style={{height:36,padding:"0 18px",borderRadius:8,border:"1.5px solid #E2E8F0",background:"#fff",
                    cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151",fontFamily:"inherit",transition:"all 0.15s"}}
                  onMouseEnter={function(e){e.currentTarget.style.borderColor="#94A3B8";}}
                  onMouseLeave={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}>
                  Cancel
                </button>
                <button onClick={function(){onApply(sel);onClose();}}
                  disabled={selCount===0}
                  style={{height:36,padding:"0 20px",borderRadius:8,border:"none",
                    background:selCount>0?"#1852FE":"#C8D3F5",color:"#fff",
                    cursor:selCount>0?"pointer":"not-allowed",fontSize:13,fontWeight:600,
                    fontFamily:"inherit",transition:"background 0.2s"}}>
                  {selCount>0?"Add "+selCount+" Metric"+(selCount!==1?"s":""):"Add Metrics"}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    // ── end Add Metric Modal ──────────────────────────────────────────────────

    // ── Comparison Filter Checkbox ────────────────────────────────────────────
    function CompCheckbox({label, checked, onChange}) {
      return (
        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,color:"#374151",fontWeight:400,userSelect:"none"}}>
          <div onClick={function(){onChange(!checked);}}
            style={{width:16,height:16,borderRadius:3,border:"1.5px solid "+(checked?"#1852FE":"#CBD5E1"),background:checked?"#1852FE":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",transition:"all 0.15s"}}>
            {checked&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
          {label}
        </label>
      );
    }

    // ── Comparison Filter Panel ───────────────────────────────────────────────
    var PEER_GROUPS = [
      {id:"chem_mid",   label:"Chemical Tanker · Mid Range"},
      {id:"chem_hand",  label:"Chemical Tanker · Handymax"},
      {id:"prod_lr1",   label:"Product Tanker · LR1"},
      {id:"prod_mr",    label:"Product Tanker · MR"},
      {id:"crude_vlcc", label:"Crude · VLCC"},
      {id:"crude_suez", label:"Crude · Suezmax"},
    ];
    var DEFAULT_FILTERS = {
      peerBenchmark: true,
      activePeerGroups: {chem_mid:true, chem_hand:true},
      loadCond: "all",
      speedRange: [6, 18],
      draftRange: [4, 18],
      voyageView: {goodWeather:false, ecaZone:false},
      fuelTypes: {hsfo:false, vlsfo:true, mgo:false, lng:false, methanol:false},
    };
    function CompFilterPanel({filters, setFilters, onReset, sortMetric, setSortMetric, sortDir, setSortDir}) {
      function set(key, val){ setFilters(function(p){ return Object.assign({},p,{[key]:val}); }); }

      function RangeInput({value, onChange, min, max}){
        var [raw, setRaw] = useState(String(value));
        useEffect(function(){ setRaw(String(value)); },[value]);
        return (
          <input
            type="number" value={raw}
            onChange={function(e){ setRaw(e.target.value); }}
            onBlur={function(){
              var n = parseFloat(raw);
              if(!isNaN(n)) onChange(Math.max(min, Math.min(max, n)));
              else setRaw(String(value));
            }}
            style={{flex:1,border:"1px solid #E2E8F0",borderRadius:6,padding:"5px 8px",fontSize:12,
              color:"#374151",textAlign:"center",background:"#fff",outline:"none",
              fontFamily:"inherit",width:0,minWidth:0}}/>
        );
      }

      function RangeSection({label, unit, rangeKey, min, max}){
        var range = filters[rangeKey];
        return (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:600,color:"#0F172A",marginBottom:8}}>
              {label} <span style={{fontWeight:400,color:"#94A3B8"}}>({unit})</span>
            </div>
            <DualRangeSlider min={min} max={max} low={range[0]} high={range[1]}
              onChange={function(l,h){ set(rangeKey,[l,h]); }}/>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
              <RangeInput value={range[0]} min={min} max={range[1]-1}
                onChange={function(v){ set(rangeKey,[v,range[1]]); }}/>
              <span style={{color:"#CBD5E1",fontSize:11,flexShrink:0}}>to</span>
              <RangeInput value={range[1]} min={range[0]+1} max={max}
                onChange={function(v){ set(rangeKey,[range[0],v]); }}/>
            </div>
          </div>
        );
      }

      return (
        <div style={{width:240,flexShrink:0,background:"#fff",border:"1px solid #E2E8F0",borderRadius:12,
          display:"flex",flexDirection:"column",overflowY:"auto",padding:"18px 16px 16px"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#0F172A",marginBottom:16,letterSpacing:"-0.01em"}}>Refine Analysis</div>

          {/* ── 1. Peer Benchmark ── */}
          <div style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #F1F5F9"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:"#0F172A"}}>Show peer average</div>
                <div style={{fontSize:11,color:"#94A3B8",marginTop:1}}>Add fleet avg column</div>
              </div>
              {/* Toggle */}
              <div onClick={function(){ set("peerBenchmark",!filters.peerBenchmark); }}
                style={{width:36,height:20,borderRadius:10,background:filters.peerBenchmark?"#1852FE":"#CBD5E1",
                  cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                <div style={{position:"absolute",top:2,left:filters.peerBenchmark?18:2,width:16,height:16,
                  borderRadius:"50%",background:"#fff",transition:"left 0.2s",
                  boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/>
              </div>
            </div>
            {filters.peerBenchmark&&(
              <div>
                <div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Active Peer Groups</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {PEER_GROUPS.map(function(pg){
                    var active = !!(filters.activePeerGroups&&filters.activePeerGroups[pg.id]);
                    return (
                      <div key={pg.id}
                        onClick={function(){
                          var next = Object.assign({},filters.activePeerGroups||{},{[pg.id]:!active});
                          set("activePeerGroups",next);
                        }}
                        style={{padding:"3px 8px",borderRadius:20,fontSize:10,fontWeight:600,cursor:"pointer",
                          transition:"all 0.15s",userSelect:"none",
                          background:active?"#EEF2FF":"#F8FAFC",
                          color:active?"#1852FE":"#94A3B8",
                          border:"1px solid "+(active?"#C7D4FD":"#E2E8F0")}}>
                        {pg.label}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {/* ── 2. Load Condition ── */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0F172A",marginBottom:8}}>Load Condition</div>
            <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #E2E8F0"}}>
              {["all","laden","ballast"].map(function(opt,i){
                var active = filters.loadCond===opt;
                return (
                  <button key={opt}
                    onClick={function(){ set("loadCond",opt); }}
                    style={{flex:1,height:30,border:"none",borderLeft:i>0?"1px solid #E2E8F0":"none",
                      background:active?"#1852FE":"#fff",color:active?"#fff":"#64748B",
                      fontSize:11,fontWeight:active?700:500,cursor:"pointer",
                      transition:"all 0.15s",textTransform:"capitalize",fontFamily:"inherit"}}>
                    {opt==="all"?"All":opt.charAt(0).toUpperCase()+opt.slice(1)}
                  </button>
                );
              })}
            </div>
          </div>

          {/* ── 3. Speed Range ── */}
          <RangeSection label="Speed Range" unit="SOG kn" rangeKey="speedRange" min={0} max={25}/>

          {/* ── 4. Draft Range ── */}
          <RangeSection label="Draft Range" unit="m" rangeKey="draftRange" min={0} max={25}/>

          {/* ── 5. Voyage View ── */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0F172A",marginBottom:8}}>Voyage View</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {[{id:"goodWeather",label:"Good Weather"},{id:"ecaZone",label:"ECA Zone"}].map(function(opt){
                var active = !!(filters.voyageView&&filters.voyageView[opt.id]);
                return (
                  <div key={opt.id}
                    onClick={function(){
                      var next = Object.assign({},filters.voyageView||{},{[opt.id]:!active});
                      set("voyageView",next);
                    }}
                    style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:500,cursor:"pointer",
                      transition:"all 0.15s",userSelect:"none",
                      background:active?"#0F172A":"#F8FAFC",
                      color:active?"#fff":"#64748B",
                      border:"1px solid "+(active?"#0F172A":"#E2E8F0")}}>
                    {opt.label}
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── 6. Fuel Type ── */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0F172A",marginBottom:8}}>Fuel Type</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {[{id:"hsfo",label:"HSFO"},{id:"vlsfo",label:"VLSFO"},{id:"mgo",label:"MGO"},{id:"lng",label:"LNG"},{id:"methanol",label:"Methanol"}].map(function(ft){
                var active = !!(filters.fuelTypes&&filters.fuelTypes[ft.id]);
                var colors = {hsfo:["#FEF3C7","#92400E","#FDE68A"],vlsfo:["#EEF2FF","#1852FE","#C7D4FD"],mgo:["#F0FDF4","#166534","#BBF7D0"],lng:["#F0F9FF","#0369A1","#BAE6FD"],methanol:["#FDF4FF","#7E22CE","#E9D5FF"]};
                var c = colors[ft.id]||["#F8FAFC","#64748B","#E2E8F0"];
                return (
                  <div key={ft.id}
                    onClick={function(){
                      var next = Object.assign({},filters.fuelTypes||{},{[ft.id]:!active});
                      set("fuelTypes",next);
                    }}
                    style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",
                      transition:"all 0.15s",userSelect:"none",
                      background:active?c[0]:"#F8FAFC",
                      color:active?c[1]:"#94A3B8",
                      border:"1px solid "+(active?c[2]:"#E2E8F0")}}>
                    {ft.label}
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── 7. Sort by ── */}
          <div style={{marginTop:"auto",paddingTop:16,borderTop:"1px solid #F1F5F9",marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0F172A",marginBottom:10}}>Sort by</div>
            {/* Metric dropdown */}
            <div style={{position:"relative",marginBottom:8}}>
              <select value={sortMetric} onChange={function(e){setSortMetric(e.target.value);}}
                style={{width:"100%",height:32,border:"1px solid #E2E8F0",borderRadius:8,padding:"0 28px 0 10px",
                  fontSize:12,color:sortMetric?"#0F172A":"#94A3B8",background:"#fff",outline:"none",
                  cursor:"pointer",fontFamily:"inherit",appearance:"none",WebkitAppearance:"none"}}>
                <option value="">All Metrics</option>
                {COMP_METRICS_DEF.map(function(m){
                  return <option key={m.id} value={m.id}>{m.label}</option>;
                })}
              </select>
              <svg style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}
                width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </div>
            {/* Best to Worst toggle */}
            <div style={{display:"flex",border:"1px solid #E2E8F0",borderRadius:8,overflow:"hidden"}}>
              <button onClick={function(){setSortDir("best");}}
                style={{flex:1,height:30,border:"none",borderRight:"1px solid #E2E8F0",
                  background:sortDir==="best"?"#1852FE":"#fff",
                  color:sortDir==="best"?"#fff":"#64748B",
                  fontSize:11,fontWeight:sortDir==="best"?700:500,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:4,
                  transition:"all 0.15s",fontFamily:"inherit"}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
                Best to Worst
              </button>
              <button onClick={function(){setSortDir("worst");}}
                style={{flex:1,height:30,border:"none",
                  background:sortDir==="worst"?"#1852FE":"#fff",
                  color:sortDir==="worst"?"#fff":"#64748B",
                  fontSize:11,fontWeight:sortDir==="worst"?700:500,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:4,
                  transition:"all 0.15s",fontFamily:"inherit"}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 5v14M5 12l7 7 7-7"/>
                </svg>
                Worst to Best
              </button>
            </div>
          </div>

          {/* ── Buttons ── */}
          <div style={{display:"flex",gap:8,paddingTop:14,borderTop:"1px solid #F1F5F9"}}>
            <button onClick={onReset}
              style={{flex:1,height:34,borderRadius:8,border:"1.5px solid #E2E8F0",background:"#fff",
                cursor:"pointer",fontSize:12,fontWeight:600,color:"#374151",transition:"all 0.15s",fontFamily:"inherit"}}
              onMouseEnter={function(e){e.currentTarget.style.borderColor="#94A3B8";}}
              onMouseLeave={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}>
              Reset
            </button>
          </div>
        </div>
      );
    }

    // ── Vessel Comparison Page ────────────────────────────────────────────────
    function VesselComparisonPage({initVessels, currentVessel, onBack}) {
      var [compVessels,setCompVessels] = useState(initVessels||[]);
      var [cmpMetrics,setCmpMetrics] = useState({sog_slip:true,fuel_cons:true,cii_aer:true,co2:true,speed_sog:true});
      var [cmpTab,setCmpTab] = useState("All");
      var [cmpDateRange,setCmpDateRange] = useState("Last 180 Days");
      var [showAddMetric,setShowAddMetric] = useState(false);
      var [addedMetrics,setAddedMetrics] = useState(function(){
        var d={};
        COMP_METRICS_DEF.forEach(function(m){ if(m.recommended) d[m.id]=true; });
        return d;
      });
      var [searchQ,setSearchQ] = useState("");
      var [searchOpen,setSearchOpen] = useState(true);
      var [filters,setFilters] = useState(DEFAULT_FILTERS);
      var [sortMetric,setSortMetric] = useState("");
      var [sortDir,setSortDir] = useState("best");
      var searchWrapRef = useRef(null);
      var searchInputRef = useRef(null);
      var CMP_TABS = [
        {id:"All",           label:"All",            disabled:false},
        {id:"Operational",   label:"Operational",    disabled:false},
        {id:"Environmental", label:"Environmental",  disabled:false},
        {id:"Technical",     label:"Technical",      disabled:false},
      ];

      var allVessels = [currentVessel].concat(compVessels);
      var showPeer = filters.peerBenchmark;
      var colCount = allVessels.length + (compVessels.length<3?1:0) + (showPeer?1:0);

      useEffect(function(){
        function handleClick(e){
          if(searchWrapRef.current&&!searchWrapRef.current.contains(e.target)) setSearchOpen(false);
        }
        document.addEventListener("mousedown",handleClick);
        return function(){ document.removeEventListener("mousedown",handleClick); };
      },[]);

      useEffect(function(){
        if(searchOpen){ setTimeout(function(){ if(searchInputRef.current) searchInputRef.current.focus(); },50); }
      },[searchOpen]);

      function removeVessel(name){
        setCompVessels(function(prev){ return prev.filter(function(v){return v.name!==name;}); });
      }
      function addVessel(v){
        if(compVessels.length>=3) return;
        if(allVessels.some(function(x){return x.name===v.name;})) return;
        setCompVessels(function(prev){ return prev.concat([v]); });
        setSearchQ("");
      }
      var filteredSearch = VESSEL_LIST.filter(function(v){
        if(allVessels.some(function(x){return x.name===v.name;})) return false;
        if(!searchQ.trim()) return true;
        var q=searchQ.toLowerCase();
        return v.name.toLowerCase().includes(q)||v.imo.toLowerCase().includes(q)||v.type.toLowerCase().includes(q);
      });

      // Group header colours aligned with COMP_METRICS_DEF groups
      var GROUP_COLOR = {Operational:"#334155",Environmental:"#334155",Technical:"#334155","LNG KPIs":"#334155"};
      var GROUP_BG   = {Operational:"#e2e8ee",Environmental:"#e2e8ee",Technical:"#e2e8ee","LNG KPIs":"#e2e8ee"};

      var MCOL=200, VCOL=200, PCOL=135;
      var tableWidth = MCOL + allVessels.length*VCOL + (showPeer?PCOL:0) + (compVessels.length<3?VCOL:0);

      // Build rows: only show metrics selected in the Add a Metric popup,
      // then filter by active tab (All = no tab filter).
      var tableRows = [];
      var lastGroup = null;
      COMP_METRICS_DEF.forEach(function(metric, idx){
        // Must be selected in the popup
        if(!addedMetrics[metric.id]) return;
        // Must match the active tab (or All shows every selected metric)
        if(cmpTab !== "All" && metric.tab !== cmpTab) return;
        if(metric.group !== lastGroup){
          tableRows.push({type:"group", group:metric.group});
          lastGroup = metric.group;
        }
        tableRows.push({type:"metric", metric:metric, idx:idx});
      });

      return (
        <React.Fragment>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"#F1F5F9"}}>

          {/* ── Topbar — two sections mirroring body layout ── */}
          <div style={{height:52,background:"transparent",display:"flex",alignItems:"center",padding:"0 24px",flexShrink:0,gap:16}}>
            {/* Left: same width as filter panel (240px) — title only */}
            <div style={{width:240,flexShrink:0,display:"flex",alignItems:"center"}}>
              <button onClick={onBack}
                style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",fontSize:18,fontWeight:700,color:"#0F172A",padding:0,fontFamily:"inherit"}}>
                <span style={{display:"flex",alignItems:"center",justifyContent:"center",width:32,height:32,borderRadius:8,flexShrink:0,transition:"background 0.15s"}}
                  onMouseEnter={function(e){e.currentTarget.style.background="#eef0f4";}}
                  onMouseLeave={function(e){e.currentTarget.style.background="none";}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </span>
                Vessel Comparison
              </button>
            </div>
            {/* Right: flex:1 — tabs + spacer + controls, aligned with table */}
            <div style={{flex:1,display:"flex",alignItems:"center",gap:12,minWidth:0}}>
              {/* Pill tabs */}
              <div style={{display:"flex",alignItems:"center",gap:4,background:"#e2e8ef",borderRadius:6,padding:"3px",flexShrink:0}}>
                {CMP_TABS.map(function(t){
                  var isActive = cmpTab === t.id;
                  return (
                    <button key={t.id}
                      onClick={function(){ if(!t.disabled) setCmpTab(t.id); }}
                      disabled={t.disabled}
                      style={{
                        height:26,padding:"0 12px",borderRadius:4,border:"none",
                        cursor:t.disabled?"not-allowed":"pointer",
                        fontSize:12,fontWeight:600,fontFamily:"inherit",
                        background:isActive?"#1852FE":"transparent",
                        color:isActive?"#ffffff":t.disabled?"#CBD5E1":"#64748B",
                        opacity:t.disabled?0.55:1,
                        boxShadow:isActive?"0 1px 3px rgba(24,82,254,0.25)":"none",
                        transition:"all 0.15s",whiteSpace:"nowrap"}}>
                      {t.label}
                    </button>
                  );
                })}
              </div>
              <div style={{flex:1}}/>
              {/* Add a Metric + Date Range */}
              <div style={{display:"flex",alignItems:"center",gap:16,flexShrink:0}}>
                <button onClick={function(){setShowAddMetric(true);}}
                  style={{display:"flex",alignItems:"center",gap:6,height:36,padding:"0 14px",borderRadius:4,border:"1.5px solid #1852FE",background:"#EEF2FF",cursor:"pointer",fontSize:13,fontWeight:600,color:"#1852FE",flexShrink:0,transition:"all 0.15s",fontFamily:"inherit",whiteSpace:"nowrap"}}
onMouseEnter={function(e){e.currentTarget.style.background="#E0E7FF";}}
onMouseLeave={function(e){e.currentTarget.style.background="#EEF2FF";}}>

                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                  </svg>
                  Add a Metric
                  {Object.values(addedMetrics).filter(Boolean).length>0&&(
                    <span style={{background:"#1852FE",color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700,marginLeft:2}}>
                      {Object.values(addedMetrics).filter(Boolean).length}
                    </span>
                  )}
                </button>
                <DateRangeDropdown onRangeChange={function(m){
                  var labels={2:"Last 30 Days",3:"Last 90 Days",6:"Last 180 Days"};
                  setCmpDateRange(labels[m]||"Custom");
                }}/>
              </div>
            </div>
          </div>

          {/* ── Body: filter panel (left) + content area (right) ── */}
          <div style={{flex:1,display:"flex",overflow:"hidden",padding:"0 24px 28px",gap:16}}>

            {/* ── Left Filter Panel ── */}
            <CompFilterPanel filters={filters} setFilters={setFilters} onReset={function(){setFilters(DEFAULT_FILTERS);setSortMetric("");setSortDir("best");}} sortMetric={sortMetric} setSortMetric={setSortMetric} sortDir={sortDir} setSortDir={setSortDir}/>

            {/* ── Right: Scrollable table ── */}
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>

              {/* ── Scrollable table area + sticky download footer ── */}
              <div style={{display:"flex",flexDirection:"column"}}>
              <div style={{overflow:"auto",maxHeight:"calc(100vh - 130px)"}}>
              <div style={{background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",width:"100%",minWidth:tableWidth,overflow:"hidden"}}>
                <table style={{width:"100%",minWidth:tableWidth,borderCollapse:"collapse",tableLayout:"fixed"}}>
                  <colgroup>
                    <col style={{width:MCOL,minWidth:MCOL}}/>
                    {allVessels.map(function(v){return <col key={v.name} style={{width:VCOL,minWidth:VCOL}}/>;})}
                    {showPeer&&<col style={{width:PCOL,minWidth:PCOL}}/>}
                    {compVessels.length<3&&<col style={{width:VCOL,minWidth:VCOL}}/>}
                  </colgroup>

                  {/* ── Sticky header row ── */}
                  <thead style={{position:"sticky",top:0,zIndex:20}}>
                    <tr style={{borderBottom:"1.5px solid #E2E8F0"}}>
                      {/* Corner cell: sticky top + sticky left */}
                      <th style={{padding:"14px 12px",textAlign:"left",fontSize:12,fontWeight:600,color:"#64748B",
                        background:"#F8FAFC",letterSpacing:"0.04em",textTransform:"uppercase",
                        position:"sticky",left:0,top:0,zIndex:25,
                        borderRight:"1.5px solid #E2E8F0",boxShadow:"2px 0 0 0 #E2E8F0",
                        borderTopLeftRadius:10}}>
                        Metrics
                      </th>
                      {allVessels.map(function(v,i){
                        var isFirst=i===0;
                        var isLastCol=i===allVessels.length-1&&!showPeer&&compVessels.length>=3;
                        var vRange=getVesselCompData(v).range;
                        return (
                          <th key={v.name} style={{padding:"10px 14px",textAlign:"left",
                            background:isFirst?"#EEF6FF":"#F8FAFC",
                            borderLeft:"1px solid #E2E8F0",verticalAlign:"middle",
                            position:"sticky",top:0,
                            left:isFirst?MCOL:undefined,
                            zIndex:isFirst?20:10,
                            boxShadow:isFirst?"2px 0 0 0 #E2E8F0":undefined,
                            borderTopRightRadius:isLastCol?10:0}}>
                            <div style={{position:"relative",paddingRight:!isFirst?24:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <VesselIcon size={36} bg={getVesselColor(v.type)}/>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{fontSize:13,fontWeight:600,color:isFirst?"#1852FE":"#1E293B",whiteSpace:"nowrap"}}>{v.name}</div>
                                  <div style={{fontSize:10,fontWeight:400,color:"#94A3B8",marginTop:1,whiteSpace:"nowrap"}}>
                                    {v.imo.replace("IMO ","")}
                                    <span style={{margin:"0 4px",color:"#CBD5E1"}}>|</span>
                                    {v.type}
                                    <span style={{margin:"0 4px",color:"#CBD5E1"}}>|</span>
                                    {vRange}
                                  </div>
                                </div>
                              </div>
                              {/* Compared vessels: remove button — top-right aligned with vessel name */}
                              {!isFirst&&(
                                <button onClick={function(){removeVessel(v.name); setSearchQ(""); setSearchOpen(true);}}
                                  style={{position:"absolute",top:0,right:0,
                                    background:"none",border:"none",cursor:"pointer",
                                    width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",
                                    color:"#94A3B8",fontSize:12,lineHeight:1,borderRadius:4,transition:"all 0.15s",flexShrink:0}}
                                  onMouseEnter={function(e){e.currentTarget.style.color="#475569";e.currentTarget.style.background="#E2E8F0";}}
                                  onMouseLeave={function(e){e.currentTarget.style.color="#94A3B8";e.currentTarget.style.background="none";}}>
                                  ✕
                                </button>
                              )}
                            </div>
                          </th>
                        );
                      })}
                      {/* Peer Benchmark column header */}
                      {showPeer&&(
                        <th style={{padding:"10px 16px",background:"#FAF5FF",borderLeft:"1px solid #E2E8F0",verticalAlign:"middle",position:"sticky",top:0,zIndex:10,textAlign:"left",borderTopRightRadius:compVessels.length>=3?10:0}}>
                          <div style={{fontSize:13,fontWeight:600,color:"#7C3AED",whiteSpace:"nowrap",textAlign:"left"}}>Peer Average</div>
                          <div style={{fontSize:10,color:"#A78BFA",marginTop:2,whiteSpace:"nowrap",textAlign:"left"}}>
                            {(function(){
                              var active = filters.activePeerGroups ? PEER_GROUPS.filter(function(pg){ return filters.activePeerGroups[pg.id]; }) : [];
                              return active.length > 0 ? active.length+" group"+(active.length>1?"s":"")+" · Fleet avg" : "Fleet average";
                            })()}
                          </div>
                        </th>
                      )}
                      {/* Add vessel search cell */}
                      {compVessels.length<3&&(
                        <th ref={searchWrapRef} style={{padding:"10px 14px",background:"#F8FAFC",borderLeft:"1px solid #E2E8F0",verticalAlign:"middle",position:"sticky",top:0,zIndex:30,overflow:"visible",borderTopRightRadius:10}}>
                          <div style={{position:"relative"}}>
                            {/* Always show expanded search input */}
                            <div style={{position:"relative",width:"100%"}}>
                                <div style={{display:"flex",alignItems:"center",gap:8,height:36,background:"#fff",
                                  border:"1.5px solid #1852FE",borderRadius:8,padding:"0 10px",
                                  boxShadow:"0 0 0 3px rgba(24,82,254,0.08)"}}>
                                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1852FE" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
                                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                                  </svg>
                                  <input ref={searchInputRef} value={searchQ}
                                    onChange={function(e){setSearchQ(e.target.value);}}
                                    placeholder="Search Vessel or IMO"
                                    style={{flex:1,border:"none",outline:"none",fontSize:13,color:"#0F172A",background:"transparent",fontFamily:"inherit"}}/>
                                  {searchQ&&(
                                    <button onClick={function(){setSearchQ("");}} style={{border:"none",background:"none",cursor:"pointer",padding:0,color:"#94A3B8",display:"flex",alignItems:"center"}}>
                                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                    </button>
                                  )}
                                </div>
                                {searchQ.trim()&&(
                                <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:"#fff",
                                  borderRadius:8,border:"1px solid #E2E8F0",boxShadow:"0 8px 24px rgba(0,0,0,0.10)",
                                  zIndex:9999,overflow:"hidden",maxHeight:320,overflowY:"auto",padding:"6px 8px"}}>
                                  {filteredSearch.length===0?(
                                    <div style={{padding:"24px 16px",textAlign:"center",color:"#94A3B8",fontSize:13}}>No vessels found</div>
                                  ):(
                                    filteredSearch.slice(0,10).map(function(v){
                                      return (
                                        <div key={v.name} onClick={function(){addVessel(v);}}
                                          style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                                            borderRadius:6,cursor:"pointer",background:"#fff",transition:"background 0.1s"}}
                                          onMouseEnter={function(e){e.currentTarget.style.background="#F4F6F9";}}
                                          onMouseLeave={function(e){e.currentTarget.style.background="#fff";}}>
                                          <VesselIcon size={32} bg={getVesselColor(v.type)}/>
                                          <div style={{flex:1,minWidth:0,textAlign:"left"}}>
                                            <div style={{fontSize:13,fontWeight:600,color:"#0F172A",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",textAlign:"left"}}>{v.name}</div>
                                            <div style={{fontSize:11,color:"#94A3B8",fontWeight:400,textAlign:"left"}}>
                                              {v.imo.replace("IMO ","")} <span style={{margin:"0 3px"}}>|</span> {v.type}
                                            </div>
                                          </div>
                                        </div>
                                      );
                                    })
                                  )}
                                </div>
                                )}
                              </div>
                          </div>
                        </th>
                      )}
                    </tr>
                  </thead>

                  {/* ── Body ── */}
                  <tbody>
                    {tableRows.map(function(row, rowIdx){
                      if(row.type==="group"){
                        var gc=GROUP_COLOR[row.group]||"#334155";
                        var gb=GROUP_BG[row.group]||"#e2e8ee";
                        return (
                          <tr key={"g-"+row.group} style={{background:gb}}>
                            <td colSpan={colCount+1}
                              style={{padding:"8px 18px",fontSize:11,fontWeight:700,color:gc,
                                letterSpacing:"0.07em",textTransform:"uppercase",
                                background:gb,
                                borderTop:"1.5px solid #E2E8F0",borderBottom:"1px solid #E2E8F0"}}>
                              {row.group}
                            </td>
                          </tr>
                        );
                      }
                      var metric=row.metric, idx=row.idx;
                      var isAlt=idx%2===1;
                      var isHighlighted=!!cmpMetrics[metric.id];
                      var rowBg=isAlt?"#FAFAFA":"#fff";
                      return (
                        <tr key={metric.id} style={{background:rowBg,borderTop:"1px solid #F1F5F9"}}>
                          {/* Sticky metric label */}
                          <td style={{padding:"10px 12px",
                            position:"sticky",left:0,background:rowBg,zIndex:4,
                            borderRight:"1.5px solid #E2E8F0",
                            boxShadow:"2px 0 0 0 #E2E8F0",
                            transition:"color 0.15s"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              {isHighlighted&&<div style={{width:3,height:28,borderRadius:2,background:"#1852FE",flexShrink:0}}/>}
                              <div>
                                <div style={{fontSize:13,fontWeight:isHighlighted?700:500,color:isHighlighted?"#1852FE":"#374151",lineHeight:1.3}}>
                                  {metric.label}
                                </div>
                                {metric.subgroup&&(
                                  <div style={{fontSize:11,color:"#94A3B8",fontWeight:400,marginTop:2,lineHeight:1.2}}>
                                    {metric.subgroup}
                                  </div>
                                )}
                              </div>
                            </div>
                          </td>
                          {allVessels.map(function(v,i){
                            var data=getVesselCompData(v,filters);
                            var val=data[metric.id];
                            var isCurrentVessel=i===0;
                            var noData=data._noData;
                            var pts=data._pts||0;
                            var lowConf=data._lowConf;
                            var seed=data._seed||0;
                            var maxPts=200;
                            var barPct=Math.min(100,(pts/maxPts)*100);
                            var barColor=isCurrentVessel?"#1852FE":"#64B5F6";
                            var valColor=noData?"#475569":isCurrentVessel?"#0F172A":"#374151";
                            var cellBg=isCurrentVessel?(isAlt?"rgba(238,246,255,0.6)":"rgba(238,246,255,0.3)"):undefined;
                            var currentVesselBg = cellBg || (isAlt ? "rgba(238,246,255,0.6)" : "rgba(238,246,255,0.3)");
                            return (
                              <td key={v.name} style={{padding:"12px 18px",borderLeft:"1px solid #F1F5F9",
                                background:isCurrentVessel?currentVesselBg:cellBg,verticalAlign:"top",
                                position:isCurrentVessel?"sticky":undefined,
                                left:isCurrentVessel?MCOL:undefined,
                                zIndex:isCurrentVessel?3:undefined,
                                boxShadow:isCurrentVessel?"2px 0 0 0 #E2E8F0":undefined}}>
                                {noData ? (
                                  <div>
                                    <div style={{display:"flex",alignItems:"center",gap:5,color:"#475569",marginBottom:3}}>
                                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                      <span style={{fontSize:12,fontWeight:600,color:"#475569"}}>No data</span>
                                    </div>
                                    <div style={{fontSize:11,color:"#475569"}}>0 points</div>
                                  </div>
                                ) : (
                                  <div>
                                    <div style={{fontSize:14,fontWeight:700,color:valColor,marginBottom:6,lineHeight:1.2}}>
                                      {val||"—"}
                                    </div>
                                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                                      <div style={{flex:1,height:2,background:"#E2E8F0",borderRadius:1,minWidth:0}}>
                                        <div style={{height:2,width:barPct+"%",background:barColor,borderRadius:1,transition:"width 0.3s"}}/>
                                      </div>
                                      <span style={{fontSize:11,color:"#94A3B8",whiteSpace:"nowrap",flexShrink:0}}>{pts} pts</span>
                                    </div>
                                    {lowConf&&(
                                      <div style={{display:"flex",alignItems:"center",gap:4,marginTop:5,color:"#F59E0B",fontSize:11,fontWeight:500}}>
